<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>AFAS Prototype</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
      tailwind.config = {
        theme: {
          extend: {
            colors: {
              brand: {
                50: "#fff7ed",
                100: "#ffedd5",
                200: "#fed7aa",
                500: "#f97316",
                600: "#ea580c",
                700: "#c2410c",
                900: "#7c2d12"
              }
            },
            boxShadow: {
              soft: "0 18px 45px rgba(15, 23, 42, 0.08)"
            }
          }
        }
      };
    </script>
    <script src="https://unpkg.com/lucide@latest/dist/umd/lucide.js"></script>
    <style>
      html {
        scroll-behavior: smooth;
      }
      body {
        background:
          radial-gradient(circle at top left, rgba(249, 115, 22, 0.08), transparent 32rem),
          linear-gradient(180deg, #fff7ed 0%, #ffffff 18rem);
      }
      .no-scrollbar::-webkit-scrollbar {
        display: none;
      }
      .no-scrollbar {
        -ms-overflow-style: none;
        scrollbar-width: none;
      }
      .qr-grid {
        background-image:
          linear-gradient(90deg, rgba(15, 23, 42, 0.12) 1px, transparent 1px),
          linear-gradient(rgba(15, 23, 42, 0.12) 1px, transparent 1px);
        background-size: 18px 18px;
      }
    </style>
  </head>
  <body class="min-h-screen text-slate-900 antialiased">
    <div class="flex min-h-screen">
      <aside id="sidebar" class="fixed inset-y-0 left-0 z-30 hidden w-72 border-r border-orange-100 bg-white/95 px-4 py-5 shadow-soft lg:block"></aside>

      <div class="flex min-h-screen flex-1 flex-col lg:pl-72">
        <header class="sticky top-0 z-20 border-b border-orange-100 bg-white/90 backdrop-blur">
          <div class="flex min-h-16 items-center justify-between gap-3 px-4 py-3 sm:px-6">
            <div class="flex items-center gap-3">
              <button id="mobileMenuButton" class="inline-flex h-10 w-10 items-center justify-center rounded-lg border border-orange-100 text-slate-700 lg:hidden" aria-label="Open menu">
                <i data-lucide="menu" class="h-5 w-5"></i>
              </button>
              <div>
                <p id="breadcrumb" class="text-xs font-semibold uppercase tracking-wide text-brand-600">AFAS Prototype</p>
                <h1 id="pageTitle" class="text-lg font-semibold text-slate-950 sm:text-xl">Dashboard</h1>
              </div>
            </div>
            <div class="flex items-center gap-2">
              <div class="hidden items-center gap-2 rounded-full border border-orange-100 bg-brand-50 px-3 py-2 text-sm text-slate-700 sm:flex">
                <span class="h-2 w-2 rounded-full bg-emerald-500"></span>
                <span>Mock data</span>
              </div>
              <select id="roleSelect" class="h-10 rounded-lg border border-orange-200 bg-white px-3 text-sm font-medium text-slate-800 outline-none focus:border-brand-500 focus:ring-2 focus:ring-orange-100">
                <option value="student">Student</option>
                <option value="lecturer">Lecturer</option>
                <option value="admin">Admin</option>
              </select>
            </div>
          </div>
        </header>

        <main id="app" class="flex-1 px-4 py-5 sm:px-6 lg:px-8"></main>
      </div>
    </div>

    <div id="mobileBackdrop" class="fixed inset-0 z-40 hidden bg-slate-950/40 lg:hidden"></div>
    <div id="mobileSidebar" class="fixed inset-y-0 left-0 z-50 hidden w-80 max-w-[88vw] bg-white px-4 py-5 shadow-soft lg:hidden"></div>
    <div id="modalRoot"></div>
    <div id="toast" class="fixed bottom-5 right-5 z-[70] hidden rounded-xl border border-orange-100 bg-white px-4 py-3 text-sm font-medium text-slate-800 shadow-soft"></div>

    <script src="./app.js"></script>
  </body>
</html>
