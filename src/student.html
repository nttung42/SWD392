<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>AFAS Mobile App</title>
    <link rel="icon" type="image/png" href="./static/favicon.png" />
    <link rel="stylesheet" href="./styles.css" />
    <script src="https://unpkg.com/lucide@latest/dist/umd/lucide.js"></script>
  </head>
  <body class="phone-page">
    <main class="phone" aria-label="Student mobile app">
      <div class="phone-notch"></div>
      <div class="phone-status">
        <span id="phoneTime">09:41</span>
        <span style="display:flex;gap:6px;align-items:center;">
          <i data-lucide="signal" width="14" height="14"></i>
          <i data-lucide="wifi" width="14" height="14"></i>
          <i data-lucide="battery-full" width="16" height="16"></i>
        </span>
      </div>

      <section class="phone-content">
        <div id="screen-login" class="mobile-screen active mobile-login">
          <img src="./static/favicon.png" alt="" style="width:52px;height:52px;margin-bottom:22px;" />
          <h1 class="mobile-title">AFAS Student</h1>
          <p class="mobile-subtitle">Sign in with your university identity.</p>
          <button id="studentLoginBtn" class="btn btn-primary btn-full" type="button">
            <i data-lucide="key-round"></i>
            Login with FEID
          </button>
        </div>

        <div id="screen-home" class="mobile-screen"></div>
        <div id="screen-timetable" class="mobile-screen"></div>
        <div id="screen-classes" class="mobile-screen"></div>
        <div id="screen-class-detail" class="mobile-screen"></div>
        <div id="screen-class-history" class="mobile-screen"></div>
        <div id="screen-qr" class="mobile-screen"></div>
        <div id="screen-pin" class="mobile-screen"></div>
        <div id="screen-report" class="mobile-screen"></div>
        <div id="screen-result" class="mobile-screen"></div>
      </section>

      <nav id="bottomNav" class="bottom-nav hidden" aria-label="Student navigation">
        <button type="button" data-tab="home">
          <i data-lucide="house" width="18" height="18"></i>
          Home
        </button>
        <button type="button" data-tab="timetable">
          <i data-lucide="calendar-days" width="18" height="18"></i>
          Timetable
        </button>
        <button type="button" data-tab="classes">
          <i data-lucide="book-open-check" width="18" height="18"></i>
          Classes
        </button>
      </nav>
    </main>

    <div id="toast" class="toast"></div>
    <script src="./student-app.js"></script>
  </body>
</html>
